<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex, nofollow">

<title>Ajanvaraus – Varaa aika</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
    color:#333;
}
header{
    background:#2c7be5;
    color:white;
    padding:60px 20px;
    text-align:center;
}
header h1{
    margin:0;
    font-size:40px;
}
header p{
    font-size:18px;
    margin-top:10px;
}
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}
.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:40px;
}
.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}
.card h3{
    margin-top:0;
}
.booking{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
footer{
    text-align:center;
    padding:30px;
    font-size:14px;
    color:#777;
}
</style>

</head>
<body>

<header>
<h1>Ajanvarauspalvelu</h1>
<p>Palvelut sinun käytettävissäsi</p>
</header>

<div class="container">

<h2>Palvelut</h2>
<div class="services">
    <div class="card">
        <h3>Nurmikon leikkuu</h3>
        <p>Nopea ja siisti nurmikon leikkuu.</p>
    </div>
    <div class="card">
        <h3>Pihan siivous</h3>
        <p>Lehdet, roskat ja pihatyöt kuntoon.</p>
    </div>
    <div class="card">
        <h3>Lumityöt</h3>
        <p>Lumenluonti ja pihan puhdistus talvella.</p>
    </div>
</div>

<h2>Varaa aika</h2>
<div class="booking">

<script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
<!-- Calendly inline widget end -->
</div>

</div>

<footer>
© 2026 Kotityöapu
</footer>

</body>
</html>
