<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex, nofollow">

<title>Ajanvaraus – Varaa aika</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
    color:#333;
}
header {
    background: #333333; /* tummanharmaa */
    color: white; /* teksti valkoiseksi */
    padding: 60px 20px; /* tilaa otsikolle ja kuvaukselle */
    text-align: center; /* keskitetään tekstit */
    border-bottom-left-radius: 10px; /* pyöristetyt kulmat */
    border-bottom-right-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* pieni varjo bannerin alle */
}
header h1 {
    margin: 0;
    font-size: 42px;
    font-family: 'Arial', sans-serif;
}
header p {
    font-size: 18px;
    margin-top: 10px;
    font-family: 'Arial', sans-serif;
}
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}
.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:40px;
}
.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
    }
    .card:hover {
    transform: translateY(-5px); /* hieman nousee */
    box-shadow: 0 10px 20px rgba(0,0,0,0.2); /* voimakkaampi varjo */
    transition: all 0.3s ease; /* pehmeä animaatio */
}
.card h3{
    margin-top:0;
}
.booking{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
footer{
    text-align:center;
    padding:30px;
    font-size:14px;
    color:#777;
}
</style>

</head>
<body>

<header>
<h1>Ajanvarauspalvelu</h1>
<p>Palvelut sinun käytettävissäsi</p>
</header>

<div class="container">

<h2>Palvelut</h2>
<div class="services">
    <div class="card">
        <h3>Nurmikon leikkuu</h3>
        <p>Nopea ja siisti nurmikon leikkuu.</p>
    </div>
    <div class="card">
        <h3>Pihan siivous</h3>
        <p>Lehdet, roskat ja pihatyöt kuntoon.</p>
    </div>
    <div class="card">
        <h3>Lumityöt</h3>
        <p>Lumenluonti ja pihan puhdistus talvella.</p>
    </div>
</div>

<h2>Varaa aika</h2>
<div class="booking">
<!-- Calendly inline widget begin -->
<div class="calendly-inline-widget" data-url="https://calendly.com/leevi-rattya/30min?hide_event_type_details=1&hide_gdpr_banner=1&background_color=1a1a1a&text_color=ffffff&primary_color=fa0000" style="min-width:320px;height:700px;"></div>
<script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
<!-- Calendly inline widget end -->
</div>

</div>

<footer>
© 2026 Kotityöapu
</footer>

</body>
</html>
